# Netlify configuration for Bennett Veterinary Service
# Plain static site — no build step required.

[build]
  publish = "."
  # Sitemap auto-generation disabled — python3 not installed on this machine.
  # We maintain sitemap.xml manually. To re-enable, install Python and uncomment:
  # command = "python3 scripts/build-sitemap.py"

# Force www → root once we cut over to bennettvet.com on Netlify.
# Uncomment AFTER the domain is connected (not before — won't affect anything until then):
#
# [[redirects]]
#   from = "https://www.bennettvet.com/*"
#   to = "https://bennettvet.com/:splat"
#   status = 301
#   force = true

# =========================================================================
# 301 redirects from old iMatrix URLs to new-site equivalents.
# Activates when DNS cuts over to Netlify. Preserves ~16 years of inbound
# link equity and prevents SEO ranking loss on URLs that won't exist on the
# new static-HTML site. Source URLs were identified via web search of pages
# Google has indexed under bennettvet.com (iMatrix CMS).
#
# Why 301 and not 302: 301 = permanent. Search engines transfer ranking
# signal to the destination. 302 = temporary, no signal transfer.
# =========================================================================

[[redirects]]
  from = "/about-us.html"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/about-us"
  to = "/about/"
  status = 301

# Euthanasia content has moved to Pets for Angels — a separate practice
# dedicated to in-home pet euthanasia. All old euthanasia URLs (whether
# from the iMatrix site or from earlier versions of this site) 301 to
# petsforangels.com to preserve SEO equity at the new destination.
[[redirects]]
  from = "/in-home-pet-euthanasia/*"
  to = "https://petsforangels.com/"
  status = 301
  force = true
[[redirects]]
  from = "/in-home-pet-euthanasia"
  to = "https://petsforangels.com/"
  status = 301
  force = true
[[redirects]]
  from = "/in-home-pet-euthanasia.html"
  to = "https://petsforangels.com/"
  status = 301
  force = true
[[redirects]]
  from = "/pet-euthanasia.html"
  to = "https://petsforangels.com/"
  status = 301
  force = true
[[redirects]]
  from = "/pet-euthanasia"
  to = "https://petsforangels.com/"
  status = 301
  force = true

[[redirects]]
  from = "/veterinary-services.html"
  to = "/services/"
  status = 301
[[redirects]]
  from = "/veterinary-services"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/meet-our-team.html"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/meet-our-team"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/staff/*"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/staff"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/veterinarian-reviews.html"
  to = "/"
  status = 301
[[redirects]]
  from = "/veterinarian-reviews"
  to = "/"
  status = 301

[[redirects]]
  from = "/new-patient-center.html"
  to = "/contact/"
  status = 301
[[redirects]]
  from = "/new-patient-center"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/what-to-expect.html"
  to = "https://petsforangels.com/"
  status = 301
  force = true
[[redirects]]
  from = "/what-to-expect"
  to = "https://petsforangels.com/"
  status = 301
  force = true

[[redirects]]
  from = "/contact-us.html"
  to = "/contact/"
  status = 301
[[redirects]]
  from = "/contact-us"
  to = "/contact/"
