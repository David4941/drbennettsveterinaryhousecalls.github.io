[[redirects]]
  from = "/mobile-veterinarian-walnut-creek/*"
  to = "/walnut-creek/"
  status = 301
[[redirects]]
  from = "/mobile-veterinarian-walnut-creek"
  to = "/walnut-creek/"
  status = 301

# Safety: /index.html → / (canonical)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# =========================================================================
# 404 fallback — must come LAST so all specific redirects above match first.
# =========================================================================
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers for a static informational site
#
# HSTS note: currently set without includeSubDomains/preload because the site
# is still served at bennettvet-preview.netlify.app (a subdomain we don't fully
# control). After DNS cutover to bennettvet.com, upgrade to:
#   Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
# and submit to https://hstspreload.org for browser-baked HTTPS enforcement.
#
# CSP note: form-action is restricted to formspree.io (the contact form's
# endpoint). If a new third-party form/service is added, update form-action
# here OR submissions will be silently blocked.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000"
    # script-src must allow 'unsafe-inline' because we use inline <script type="application/ld+json"> for schema.org markup (read by Google, not executed). The site has zero actual JavaScript.
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://formspree.io; form-action 'self' https://formspree.io; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Cache headers — static informational site, content rarely changes.
# Strategy:
#   - HTML: always revalidate so rebrand/typo fixes appear immediately.
#   - CSS: 1 day (no fingerprinting, so we can't go longer safely).
#   - Images / fonts / favicon: 30 days. Filenames are stable; if we ever
#     replace one in place, worst case is users see the old copy for a month.
#   - Sitemap / robots: short cache so search engines pick up changes fast.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
