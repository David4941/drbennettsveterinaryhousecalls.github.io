# Netlify configuration for Bennett Veterinary Service
# Plain static site — no build step required.

[build]
  publish = "."
  # Regenerate sitemap.xml on every deploy so <lastmod> and image entries
  # always reflect the current site without manual maintenance.
  command = "python3 scripts/build-sitemap.py"

# Force www → root once we cut over to bennettvet.com on Netlify.
# Uncomment AFTER the domain is connected (not before — won't affect anything until then):
#
# [[redirects]]
#   from = "https://www.bennettvet.com/*"
#   to = "https://bennettvet.com/:splat"
#   status = 301
#   force = true

# =========================================================================
# 301 redirects from old iMatrix URLs to new-site equivalents.
# Activates when DNS cuts over to Netlify. Preserves ~16 years of inbound
# link equity and prevents SEO ranking loss on URLs that won't exist on the
# new static-HTML site. Source URLs were identified via web search of pages
# Google has indexed under bennettvet.com (iMatrix CMS).
#
# Why 301 and not 302: 301 = permanent. Search engines transfer ranking
# signal to the destination. 302 = temporary, no signal transfer.
# =========================================================================

[[redirects]]
  from = "/about-us.html"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/about-us"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/pet-euthanasia.html"
  to = "/in-home-pet-euthanasia/"
  status = 301
[[redirects]]
  from = "/pet-euthanasia"
  to = "/in-home-pet-euthanasia/"
  status = 301
[[redirects]]
  from = "/in-home-pet-euthanasia.html"
  to = "/in-home-pet-euthanasia/"
  status = 301

[[redirects]]
  from = "/veterinary-services.html"
  to = "/services/"
  status = 301
[[redirects]]
  from = "/veterinary-services"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/meet-our-team.html"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/meet-our-team"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/staff/*"
  to = "/about/"
  status = 301
[[redirects]]
  from = "/staff"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/veterinarian-reviews.html"
  to = "/"
  status = 301
[[redirects]]
  from = "/veterinarian-reviews"
  to = "/"
  status = 301

[[redirects]]
  from = "/new-patient-center.html"
  to = "/contact/"
  status = 301
[[redirects]]
  from = "/new-patient-center"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/what-to-expect.html"
  to = "/in-home-pet-euthanasia/"
  status = 301
[[redirects]]
  from = "/what-to-expect"
  to = "/in-home-pet-euthanasia/"
  status = 301

[[redirects]]
  from = "/contact-us.html"
  to = "/contact/"
  status = 301
[[redirects]]
  from = "/contact-us"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/mobile-veterinarian-walnut-creek/*"
  to = "/walnut-creek/"
  status = 301
[[redirects]]
  from = "/mobile-veterinarian-walnut-creek"
  to = "/walnut-creek/"
  status = 301

# Safety: /index.html → / (canonical)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# =========================================================================
# 404 fallback — must come LAST so all specific redirects above match first.
# =========================================================================
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers for a static informational site
#
# HSTS note: currently set without includeSubDomains/preload because the site
# is still served at bennettvet-preview.netlify.app (a subdomain we don't fully
# control). After DNS cutover to bennettvet.com, upgrade to:
#   Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
# and submit to https://hstspreload.org for browser-baked HTTPS enforcement.
#
# CSP note: form-action is restricted to formspree.io (the contact form's
# endpoint). If a new third-party form/service is added, update form-action
# here OR submissions will be silently blocked.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000"
    # script-src must allow 'unsafe-inline' because we use inline <script type="application/ld+json"> for schema.org markup (read by Google, not executed). The site has zero actual JavaScript.
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://formspree.io; form-action 'self' https://formspree.io; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
